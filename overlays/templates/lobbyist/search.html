{% extends "base.html" %}

{% block title %}Search - Legislink{% endblock %}

{% block sidebar %}
    {% include "includes/lobbyist_sidebar.html" %}
{% endblock %}

{% block content %}
<header style="margin-bottom: 0.75rem;"><h1>Search Bills</h1></header>
<p id="bill-table-search-status" style="font-size: 0.8rem; color: #666; margin: 0 0 0.6rem;"></p>
<table class="bills-table" style="width: 100%; border-collapse: collapse;">
    <thead>
        <tr>
            <th>Flag</th>
            <th>Bill</th>
            <th>Title</th>
            <th>Sponsor</th>
            <th>Subjects</th>
            <th>Location</th>
            <th>Note</th>
            <th>Track</th>
        </tr>
    </thead>
    <tbody id="bill-table-body"></tbody>
</table>
{% endblock %}
